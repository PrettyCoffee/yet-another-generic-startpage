name: Validate code

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.13.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        
      - name: Build project
        run: pnpm run build
        
      - name: Lint code
        run: pnpm run lint
